events {}

http {

# ----------------------------------REACT----------------------------------
    server {

        listen 443 ssl;
        server_name agromag.local;

#         ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate     /etc/nginx/certs/cert.pem;
#         ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {

         proxy_pass http://host.docker.internal:5173;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

        }
    }

    # ----------------------------------BROWSER BFFs----------------------------------
    server {
        listen 443 ssl;
#         server_name browserapi.agromag.local;
        server_name api.agromag.local;

        client_max_body_size 15M;

#         ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate     /etc/nginx/certs/cert.pem;
#         ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_certificate_key /etc/nginx/certs/key.pem;


#         location / {
        location /browser/ {
            proxy_pass http://browser-bff:3000/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /android/ {
            proxy_pass http://android-bff:3001/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

#     ----------------------------------KEYCLOAK----------------------------------
    server {
        listen 443 ssl;
        server_name auth.agromag.local;

#         ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate     /etc/nginx/certs/cert.pem;
#         ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            proxy_pass http://keycloak:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

# ----------------------------------MINIO----------------------------------
    server {
        listen 443 ssl;
        server_name minio.agromag.local;

#         ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate     /etc/nginx/certs/cert.pem;
#         ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            proxy_pass http://webstore-minio:9000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}